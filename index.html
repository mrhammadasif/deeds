<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deeds Tracker</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- PWA Settings -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0d1117">
    <link rel="apple-touch-icon" href="/icon.svg">

    <link rel="stylesheet" href="styles.css?v=9">
</head>

<body>
    <div class="container">
        <!-- Portion MBH -->
        <div class="portion" id="portion-mbh">
            <h2 class="portion-title">MBH</h2>
            <div class="stars-container">
                <button class="star-btn star-good" onclick="logDeed('mbh', 'good')" aria-label="Log Good Deed for MBH">
                    <span class="deed-count" id="count-mbh-good">-</span>
                    <svg class="star-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                    </svg>
                    <span class="star-label">Good Deed</span>
                </button>
                <button class="star-btn star-bad" onclick="logDeed('mbh', 'bad')" aria-label="Log Bad Deed for MBH">
                    <span class="deed-count" id="count-mbh-bad">-</span>
                    <svg class="star-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                    </svg>
                    <span class="star-label">Bad Deed</span>
                </button>
            </div>
        </div>

        <!-- Portion ZBH -->
        <div class="portion" id="portion-zbh">
            <h2 class="portion-title">ZBH</h2>
            <div class="stars-container">
                <button class="star-btn star-good" onclick="logDeed('zbh', 'good')" aria-label="Log Good Deed for ZBH">
                    <span class="deed-count" id="count-zbh-good">-</span>
                    <svg class="star-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                    </svg>
                    <span class="star-label">Good Deed</span>
                </button>
                <button class="star-btn star-bad" onclick="logDeed('zbh', 'bad')" aria-label="Log Bad Deed for ZBH">
                    <span class="deed-count" id="count-zbh-bad">-</span>
                    <svg class="star-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                    </svg>
                    <span class="star-label">Bad Deed</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Supabase Login Overlay -->
    <div class="login-overlay" id="login-overlay">
        <div class="login-card">
            <h1 class="login-title">Deeds Tracker</h1>
            <p class="login-subtitle" id="login-message">Verifying session...</p>

            <button class="auth-btn login-btn" id="google-login-btn" onclick="signInWithGoogle()" style="display: none;">
                <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335" />
                </svg>
                Sign in with Google
            </button>


            <button class="auth-btn logout-btn" id="supa-logout-btn" onclick="signOut()" style="display: none;">Sign
                Out</button>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js?v=12"></script>
</body>

</html>
