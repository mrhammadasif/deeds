<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deeds Tracker</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <!-- Portion MBH -->
        <div class="portion" id="portion-mbh">
            <h2 class="portion-title">MBH</h2>
            <div class="stars-container">
                <button class="star-btn star-good" onclick="logDeed('mbh', 'good')" aria-label="Log Good Deed for MBH">
                    <svg class="star-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                    </svg>
                    <span class="tooltip">Good Deed</span>
                </button>
                <button class="star-btn star-bad" onclick="logDeed('mbh', 'bad')" aria-label="Log Bad Deed for MBH">
                    <svg class="star-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                    </svg>
                    <span class="tooltip">Bad Deed</span>
                </button>
            </div>
        </div>

        <!-- Portion ZBH -->
        <div class="portion" id="portion-zbh">
            <h2 class="portion-title">ZBH</h2>
            <div class="stars-container">
                <button class="star-btn star-good" onclick="logDeed('zbh', 'good')" aria-label="Log Good Deed for ZBH">
                    <svg class="star-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                    </svg>
                    <span class="tooltip">Good Deed</span>
                </button>
                <button class="star-btn star-bad" onclick="logDeed('zbh', 'bad')" aria-label="Log Bad Deed for ZBH">
                    <svg class="star-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                    </svg>
                    <span class="tooltip">Bad Deed</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Auth Controls -->
    <div class="auth-container">
        <button id="authorize_button" onclick="handleAuthClick()" class="auth-btn" disabled>Loading Auth...</button>
        <button id="signout_button" onclick="handleSignoutClick()" class="auth-btn" style="display: none;">Sign
            Out</button>
    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Google API Libraries -->
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
    <script src="script.js"></script>
</body>

</html>
